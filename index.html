<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContactFixer</title>
<meta name="description" content="Adds +1 to your US phone contacts. Free, private, on-device.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --surface: #18181b; --border: #27272a;
    --green: #4ade80; --text: #f4f4f5; --muted: #71717a;
    --mono: 'DM Mono', monospace; --serif: 'Fraunces', serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 15px; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: var(--text); text-decoration: none; }
  .nav-logo span { color: var(--green); }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; transition: color 0.2s; }
  .nav-links a:hover { color: var(--green); }

  main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 1.5rem; text-align: center; }

  h1 { font-family: var(--serif); font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 300; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 1rem; }
  h1 em { font-style: italic; color: var(--green); }
  .sub { font-size: 0.9rem; color: var(--muted); max-width: 360px; margin-bottom: 3rem; }

  .demo { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.75rem; font-size: 0.85rem; width: 100%; max-width: 400px; text-align: left; }
  .row { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .old { color: #f87171; flex: 1; }
  .arr { color: var(--muted); font-size: 0.7rem; }
  .new { color: var(--green); flex: 1; text-align: right; }

  footer { padding: 1.5rem; text-align: center; font-size: 0.75rem; color: var(--muted); display: flex; justify-content: center; gap: 1.5rem; border-top: 1px solid var(--border); }
  footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  footer a:hover { color: var(--green); }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">ContactFixer<span>.</span></a>
  <div class="nav-links">
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy</a>
  </div>
</nav>
<main>
  <h1>Your contacts,<br><em>properly formatted.</em></h1>
  <p class="sub">Adds +1 to your US phone numbers in one tap. Private, free, on-device.</p>
  <div class="demo">
    <div class="row"><span class="old">(708) 555-0142</span><span class="arr">→</span><span class="new">+17085550142</span></div>
    <div class="row"><span class="old">312-555-0198</span><span class="arr">→</span><span class="new">+13125550198</span></div>
    <div class="row"><span class="old">8005550167</span><span class="arr">→</span><span class="new">+18005550167</span></div>
  </div>
</main>
<footer>
  <a href="privacy.html">Privacy Policy</a>
  <a href="support.html">Support</a>
  <span>© 2026 ContactFixer</span>
</footer>
</body>
</html>
